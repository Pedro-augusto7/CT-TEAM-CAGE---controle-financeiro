<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT Team Cage - Sistema PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: Arial; background:#0f0f0f; color:white; margin:0;}
header {background:#ff1e1e; padding:12px; text-align:center; font-size:18px;}
.container {padding:10px;}
input, select, textarea, button {padding:8px; margin:4px; border-radius:6px; border:none; font-size:14px;}
button {background:#ff1e1e; color:white; cursor:pointer;}
.card {background:#1a1a1a; padding:10px; border-radius:10px; margin-bottom:10px;}
table {width:100%; border-collapse: collapse; margin-bottom:10px;}
th, td {border:1px solid #333; padding:6px; text-align:center; font-size:13px;}
.hidden {display:none;}
.tabs {display:flex; flex-wrap:wrap;}
.tabs button {flex:1; margin:2px;}
.sucesso {color:#00ff88; font-size:13px;}
img {max-width:100%; border-radius:8px; margin-top:5px;}
</style>
</head>
<body>

<header>CT Team Cage</header>
<div class="container">

<div id="loginArea" class="card">
<input id="login" placeholder="Login">
<input id="senha" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>

<div id="app" class="hidden">

<div class="tabs">
<button onclick="mostrarAba('alunos')">Alunos</button>
<button onclick="mostrarAba('lista')">Lista</button>
<button onclick="mostrarAba('treinos')">Treinos</button>
<button onclick="mostrarAba('financeiro')">Financeiro</button>
<button onclick="mostrarAba('pagamento')">Pagamento</button>
<button onclick="mostrarAba('recibos')" id="btnRecibos">Recibos</button>
</div>

<div id="alunos" class="aba">
<div class="card">
<input id="nome" placeholder="Nome completo">
<input id="valor" type="number" placeholder="Mensalidade">
<input id="nascimento" type="date">
<select id="modalidade"><option>Muay Thai</option><option>Jiu-jitsu</option><option>Ambos</option></select>
<input id="frequencia" type="number" placeholder="Dias por semana">
<select id="horario">
<option>07h</option><option>10h</option><option>17h</option>
<option>18h</option><option>19h</option><option>20h</option><option>21h</option>
</select>
<button onclick="addAluno()">Cadastrar</button>
<div id="msgCadastro" class="sucesso"></div>
</div>
</div>

<div id="lista" class="aba hidden">
<div class="card">
<table>
<thead><tr><th>Chapa</th><th>Nome</th><th>Nascimento</th><th>Ação</th></tr></thead>
<tbody id="listaAlunos"></tbody>
</table>
</div>
</div>

<div id="treinos" class="aba hidden">
<div class="card" id="listaTreinos"></div>
</div>

<div id="financeiro" class="aba hidden">
<div class="card">
<canvas id="grafico"></canvas>
</div>
</div>

<div id="pagamento" class="aba hidden">
<div class="card">
<input type="file" id="comprovante">
<input id="comentario" placeholder="Nome do aluno">
<button onclick="enviarComprovante()">Enviar</button>
</div>
</div>

<div id="recibos" class="aba hidden">
<div class="card">
<ul id="listaRecibos"></ul>
</div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-RgXCfsR6Q-JrAiTPdPFw006dP38g7qQ",
  authDomain: "ct-team-cage.firebaseapp.com",
  projectId: "ct-team-cage",
  storageBucket: "ct-team-cage.firebasestorage.app",
  messagingSenderId: "540497002709",
  appId: "1:540497002709:web:bff67ee8f4d5abe689a25c",
  measurementId: "G-X3FBNMRCQR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let alunos=[];
let recibos=[];
let chart;

function entrar(){
  loginArea.classList.add('hidden');
  app.classList.remove('hidden');
}

function gerarChapa(){
  if(alunos.length===0) return 1100;
  return Math.max(...alunos.map(a=>a.chapa))+1;
}

function addAluno(){
  const chapa=gerarChapa();
  const nomeCompleto=nome.value;
  const primeiro=nomeCompleto.split(' ')[0].toLowerCase();

  db.collection('alunos').add({
    chapa,nome:nomeCompleto,nascimento:nascimento.value,
    valor:parseFloat(valor.value),modalidade:modalidade.value,
    frequencia:frequencia.value,horario:horario.value
  });

  msgCadastro.innerText=`Cadastro concluído - Login: aluno.${primeiro} | Senha: ${chapa}`;
  nome.value=''; valor.value=''; nascimento.value=''; frequencia.value='';
}

function excluirAluno(id){ db.collection('alunos').doc(id).delete(); }

function editarAluno(id, nomeAtual){
  const novo = prompt('Editar nome:', nomeAtual);
  if(novo) db.collection('alunos').doc(id).update({nome:novo});
}

function enviarComprovante(){
  const file=comprovante.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(e){
    db.collection('recibos').add({
      arquivo:file.name,
      comentario:comentario.value,
      imagem:e.target.result
    });
  };
  reader.readAsDataURL(file);

  comprovante.value=''; comentario.value='';
}

// realtime
db.collection('alunos').onSnapshot(snap=>{
  alunos=[];
  snap.forEach(doc=> alunos.push({id:doc.id,...doc.data()}));
  atualizar();
});

db.collection('recibos').onSnapshot(snap=>{
  recibos=[];
  snap.forEach(doc=> recibos.push(doc.data()));
  atualizar();
});

function atualizar(){
  listaAlunos.innerHTML=''; listaRecibos.innerHTML='';

  let faturamento=0;
  let treinos={"07h":[],"10h":[],"17h":[],"18h":[],"19h":[],"20h":[],"21h":[]};

  alunos.forEach(a=>{
    faturamento+=a.valor||0;
    listaAlunos.innerHTML+=`<tr>
<td>${a.chapa}</td>
<td>${a.nome}</td>
<td>${a.nascimento}</td>
<td>
<button onclick="editarAluno('${a.id}','${a.nome}')">Editar</button>
<button onclick="excluirAluno('${a.id}')">Excluir</button>
</td></tr>`;

    if(treinos[a.horario]) treinos[a.horario].push(a.nome);
  });

  let html='';
  for(let h in treinos){
    html+=`<table><tr><th>${h}</th></tr>`;
    treinos[h].forEach(n=> html+=`<tr><td>${n}</td></tr>`);
    html+='</table>';
  }
  listaTreinos.innerHTML=html;

  recibos.forEach(r=>{
    listaRecibos.innerHTML+=`<li>${r.comentario} - ${r.arquivo}<br><img src="${r.imagem}"></li>`;
  });

  if(chart) chart.destroy();
  chart=new Chart(grafico,{type:'bar',data:{labels:['Faturamento'],datasets:[{data:[faturamento],backgroundColor:['blue']}]}});
}

function mostrarAba(id){
  document.querySelectorAll('.aba').forEach(a=>a.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

window.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const ativo=document.querySelector('.aba:not(.hidden) button');
    if(ativo) ativo.click();
  }
});

</script>

</body>
</html>
